<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisa Database 4D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .code-block {
            word-break: break-all;
            white-space: normal;
            background: #0f172a;
            color: #94a3b8;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #1e293b;
            line-height: 2;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-xl font-bold text-center mb-6 text-blue-400">📊 PANEL ANALISA DATABASE</h1>

        <div id="loader" class="text-center my-10 text-slate-500 animate-pulse">Menghubungkan ke GitHub...</div>

        <div id="app" class="hidden space-y-4">
            <div class="grid grid-cols-1 gap-3">
                <div class="bg-slate-900 p-4 rounded-lg border border-slate-800 shadow-md">
                    <div class="flex justify-between items-center cursor-pointer" onclick="bukaDetail('hk')">
                        <div>
                            <p class="text-xs font-bold text-slate-500">HONGKONG</p>
                            <p class="text-lg font-bold text-yellow-500" id="stat-hk">0 Angka</p>
                        </div>
                        <button class="text-[10px] bg-slate-800 px-2 py-1 rounded">LIHAT</button>
                    </div>
                    <div id="box-hk" class="hidden mt-4">
                        <button onclick="copy('txt-hk')" class="w-full bg-blue-600 text-[10px] font-bold py-2 rounded mb-2">SALIN DATA HK</button>
                        <div id="txt-hk" class="code-block"></div>
                    </div>
                </div>

                <div class="bg-slate-900 p-4 rounded-lg border border-slate-800 shadow-md">
                    <div class="flex justify-between items-center cursor-pointer" onclick="bukaDetail('sdy')">
                        <div>
                            <p class="text-xs font-bold text-slate-500">SYDNEY</p>
                            <p class="text-lg font-bold text-blue-500" id="stat-sdy">0 Angka</p>
                        </div>
                        <button class="text-[10px] bg-slate-800 px-2 py-1 rounded">LIHAT</button>
                    </div>
                    <div id="box-sdy" class="hidden mt-4">
                        <button onclick="copy('txt-sdy')" class="w-full bg-blue-600 text-[10px] font-bold py-2 rounded mb-2">SALIN DATA SDY</button>
                        <div id="txt-sdy" class="code-block"></div>
                    </div>
                </div>

                <div class="bg-slate-900 p-4 rounded-lg border border-slate-800 shadow-md">
                    <div class="flex justify-between items-center cursor-pointer" onclick="bukaDetail('sgp')">
                        <div>
                            <p class="text-xs font-bold text-slate-500">SINGAPORE</p>
                            <p class="text-lg font-bold text-green-500" id="stat-sgp">0 Angka</p>
                        </div>
                        <button class="text-[10px] bg-slate-800 px-2 py-1 rounded">LIHAT</button>
                    </div>
                    <div id="box-sgp" class="hidden mt-4">
                        <button onclick="copy('txt-sgp')" class="w-full bg-blue-600 text-[10px] font-bold py-2 rounded mb-2">SALIN DATA SGP</button>
                        <div id="txt-sgp" class="code-block"></div>
                    </div>
                </div>
            </div>

            <div class="bg-indigo-950/20 p-5 rounded-xl border border-indigo-500/30">
                <h2 class="font-bold text-indigo-400">💎 DUPLIKAT (SAMA DI 3 PASARAN)</h2>
                <p id="total-duplikat" class="text-[10px] text-slate-500 mb-3">Total: 0</p>
                <div id="txt-duplikat" class="code-block border-indigo-500/10 text-indigo-300"></div>
            </div>

            <div class="bg-rose-950/20 p-5 rounded-xl border border-rose-500/30">
                <h2 class="font-bold text-rose-400">🔥 ANGKA PERAWAN (BELUM RESULT)</h2>
                <p id="total-perawan" class="text-[10px] text-slate-500 mb-3">Total: 0</p>
                <div id="txt-perawan" class="code-block border-rose-500/10 text-rose-300"></div>
            </div>
        </div>
    </div>

    <script src="analisa.js"></script>
</body>
</html>
