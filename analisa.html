<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisa Database 4D - Koh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .code-block {
            word-break: break-all;
            white-space: normal;
            background: #1e293b;
            color: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #334155;
            line-height: 1.8;
            font-size: 14px;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4 pb-10">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-400 border-b border-slate-700 pb-4">📊 ANALISA DATABASE 4D</h1>
        
        <div id="loader" class="flex flex-col items-center justify-center my-20">
            <div class="loading-spinner"></div>
            <p class="mt-4 text-slate-400 animate-pulse text-sm">Sedang sinkronisasi data GitHub...</p>
        </div>

        <div id="main-content" class="hidden space-y-4">
            
            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-lg">
                <div class="flex justify-between items-center cursor-pointer" onclick="toggleDetail('hk')">
                    <div>
                        <h2 class="font-bold text-lg text-yellow-500">DATA HONGKONG (HK)</h2>
                        <p class="text-sm font-semibold text-emerald-400" id="stat-hk">Menghitung...</p>
                    </div>
                    <button class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-[10px] uppercase tracking-wider font-bold text-slate-300">Detail</button>
                </div>
                <div id="detail-hk" class="hidden mt-4 pt-4 border-t border-slate-700">
                    <button onclick="copyToClipboard('code-hk')" class="mb-3 w-full text-xs bg-blue-600 py-2 rounded font-bold hover:bg-blue-500 transition">SALIN DATA HK</button>
                    <div id="code-hk" class="code-block"></div>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-lg">
                <div class="flex justify-between items-center cursor-pointer" onclick="toggleDetail('sdy')">
                    <div>
                        <h2 class="font-bold text-lg text-blue-500">DATA SYDNEY (SDY)</h2>
                        <p class="text-sm font-semibold text-emerald-400" id="stat-sdy">Menghitung...</p>
                    </div>
                    <button class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-[10px] uppercase tracking-wider font-bold text-slate-300">Detail</button>
                </div>
                <div id="detail-sdy" class="hidden mt-4 pt-4 border-t border-slate-700">
                    <button onclick="copyToClipboard('code-sdy')" class="mb-3 w-full text-xs bg-blue-600 py-2 rounded font-bold hover:bg-blue-500 transition">SALIN DATA SDY</button>
                    <div id="code-sdy" class="code-block"></div>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-lg">
                <div class="flex justify-between items-center cursor-pointer" onclick="toggleDetail('sgp')">
                    <div>
                        <h2 class="font-bold text-lg text-green-500">DATA SINGAPORE (SGP)</h2>
                        <p class="text-sm font-semibold text-emerald-400" id="stat-sgp">Menghitung...</p>
                    </div>
                    <button class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-[10px] uppercase tracking-wider font-bold text-slate-300">Detail</button>
                </div>
                <div id="detail-sgp" class="hidden mt-4 pt-4 border-t border-slate-700">
                    <button onclick="copyToClipboard('code-sgp')" class="mb-3 w-full text-xs bg-blue-600 py-2 rounded font-bold hover:bg-blue-500 transition">SALIN DATA SGP</button>
                    <div id="code-sgp" class="code-block"></div>
                </div>
            </div>

            <div class="py-4"></div>

            <div class="bg-indigo-900/40 p-5 rounded-xl border border-indigo-500/50 shadow-xl">
                <h2 class="font-black text-xl text-indigo-300 mb-1">💎 DUPLIKAT (3 PASARAN)</h2>
                <p id="count-duplikat" class="text-xs text-indigo-400 font-bold mb-4 italic">Total: 0 Angka</p>
                <button onclick="copyToClipboard('code-duplikat')" class="mb-3 w-full text-xs bg-indigo-600 py-2 rounded font-bold hover:bg-indigo-500">SALIN DUPLIKAT</button>
                <div id="code-duplikat" class="code-block border-indigo-800/50"></div>
            </div>

            <div class="bg-rose-900/40 p-5 rounded-xl border border-rose-500/50 shadow-xl">
                <h2 class="font-black text-xl text-rose-300 mb-1">🔥 ANGKA PERAWAN</h2>
                <p id="count-perawan" class="text-xs text-rose-400 font-bold mb-4 italic">Total: 0 Angka</p>
                <button onclick="copyToClipboard('code-perawan')" class="mb-3 w-full text-xs bg-rose-600 py-2 rounded font-bold hover:bg-rose-500">SALIN PERAWAN</button>
                <div id="code-perawan" class="code-block border-rose-800/50"></div>
            </div>

        </div>
    </div>

    <script>
    const config = {
        // GANTI BAGIAN INI JIKA BRANCH ANDA BUKAN 'main'
        baseUrl: "https://raw.githubusercontent.com/Mahasewa/masin-bbfs/main/",
        files: {
            hk: 'data_keluaran_hk.txt',
            sdy: 'data_keluaran_sdy.txt',
            sgp: 'data_keluaran_sgp.txt'
        }
    };

    let dataFinal = { hk: [], sdy: [], sgp: [] };

    async function jalankanAnalisa() {
        try {
            // Mengambil data dengan penanganan error yang lebih detail
            const results = await Promise.all(
                Object.values(config.files).map(async (file) => {
                    const response = await fetch(config.baseUrl + file + '?t=' + new Date().getTime()); // Tambah t agar tidak kena cache
                    if (!response.ok) throw new Error("File " + file + " tidak ditemukan");
                    return await response.text();
                })
            );

            dataFinal.hk = bersihkanData(results[0]);
            dataFinal.sdy = bersihkanData(results[1]);
            dataFinal.sgp = bersihkanData(results[2]);

            // Jika hasil masih 0, tampilkan peringatan di konsol
            console.log("Data Berhasil Dimuat:", dataFinal);

            updateTampilanStatistik();
            prosesLogikaAnalisa();

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        } catch (err) {
            console.error("Error Detail:", err);
            document.getElementById('loader').innerHTML = `
                <div class="text-center p-4">
                    <p class="text-red-500 font-bold">ERROR: GAGAL AMBIL DATA</p>
                    <p class="text-xs text-slate-400 mt-2">${err.message}</p>
                    <p class="text-[10px] mt-4">Pastikan link github Koh bersifat PUBLIC dan nama branch benar.</p>
                </div>
            `;
        }
    }

    function bersihkanData(teksRaw) {
        if (!teksRaw) return [];
        // Membersihkan karakter aneh, memecah berdasarkan spasi/tab/enter
        // Lalu filter hanya yang benar-benar 4 digit angka
        const kumpul = teksRaw.replace(/[^\d\s\t\n\r]/g, ' ') // Hapus karakter non-angka kecuali pemisah
                             .split(/[\s\t\n\r]+/)
                             .map(item => item.trim())
                             .filter(item => item.length === 4 && /^\d+$/.test(item));
        
        return [...new Set(kumpul)]; // Unik agar tidak dobel
    }

    function updateTampilanStatistik() {
        document.getElementById('stat-hk').innerText = `✅ Terdata: ${dataFinal.hk.length} Angka`;
        document.getElementById('stat-sdy').innerText = `✅ Terdata: ${dataFinal.sdy.length} Angka`;
        document.getElementById('stat-sgp').innerText = `✅ Terdata: ${dataFinal.sgp.length} Angka`;

        document.getElementById('code-hk').innerText = dataFinal.hk.length > 0 ? dataFinal.hk.join('*') : 'Kosong';
        document.getElementById('code-sdy').innerText = dataFinal.sdy.length > 0 ? dataFinal.sdy.join('*') : 'Kosong';
        document.getElementById('code-sgp').innerText = dataFinal.sgp.length > 0 ? dataFinal.sgp.join('*') : 'Kosong';
    }

    function prosesLogikaAnalisa() {
        const masterSet = new Set([...dataFinal.hk, ...dataFinal.sdy, ...dataFinal.sgp]);

        const irisan = dataFinal.hk.filter(x => dataFinal.sdy.includes(x) && dataFinal.sgp.includes(x));
        document.getElementById('count-duplikat').innerText = `Total: ${irisan.length} Angka (Muncul di semua pasaran)`;
        document.getElementById('code-duplikat').innerText = irisan.length > 0 ? irisan.join('*') : "Belum ada angka duplikat.";

        let listPerawan = [];
        for (let i = 0; i <= 9999; i++) {
            let formatted = i.toString().padStart(4, '0');
            if (!masterSet.has(formatted)) {
                listPerawan.push(formatted);
            }
        }
        document.getElementById('count-perawan').innerText = `Total: ${listPerawan.length} Angka Belum Pernah Keluar`;
        document.getElementById('code-perawan').innerText = listPerawan.join('*');
    }

    function toggleDetail(id) {
        const el = document.getElementById(`detail-${id}`);
        el.classList.toggle('hidden');
    }

    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        if(!text || text.includes("Menghitung")) return;
        navigator.clipboard.writeText(text).then(() => {
            alert("Berhasil disalin!");
        });
    }

    jalankanAnalisa();
</script>
</body>
</html>
